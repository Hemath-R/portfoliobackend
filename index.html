<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HEMATH Portfolio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ... (existing CSS unchanged) ... */
  </style>
</head>
<body>
  <div class="cosmic-bg"></div>
  <div class="stars" id="stars"></div>
  <div class="nebula"></div>
  <div class="floating-planets">
    <div class="planet planet-1"></div>
    <div class="planet planet-2"></div>
    <div class="planet planet-3"></div>
  </div>

  <header id="header">
    <div class="container">
      <nav>
        <div class="logo">HEMATH</div>
        <div class="menu-toggle" id="menuToggle">
          <div class="hamburger">
            <span></span><span></span><span></span>
          </div>
        </div>
        <ul class="nav-links" id="navLinks">
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#skills">Skills</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="hero" id="home">
    <div class="container">
      <div class="hero-content">
        <h1>Hello, I'm <span class="highlight">HEMATH</span></h1>
        <h2>I'm a <span id="profession">Front End & Backend Developer</span> crafting digital galaxies</h2>
        <div class="button-group">
          <a href="#projects" class="cta-button">Explore My Universe</a>
          <a href="#contact" class="cta-button secondary">Contact Me</a>
        </div>
      </div>
    </div>
  </section>

  <!-- sections about, skills, projects etc. here (existing content) -->

  <section class="contact" id="contact">
    <div class="container">
      <h2>Contact Me</h2>
      <div class="contact-form">
        <form id="contactForm">
          <div class="form-group">
            <label for="formName">Name</label>
            <input type="text" id="formName" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="submit-button">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2025 Hemath. All Rights Reserved.</p>
    </div>
  </footer>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    menuToggle.addEventListener('click', () => navLinks.classList.toggle('active'));

    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => navLinks.classList.remove('active'));
    });

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          window.scrollTo({ top: target.offsetTop - 70, behavior: 'smooth' });
        }
      });
    });

    const professionElement = document.getElementById('profession');
    if (professionElement) {
      const professions = ["Front End Developer", "Backend Developer", "UI/UX Designer", "Creative Coder"];
      let currentIndex = 0;
      let currentCharIndex = 0;
      let isDeleting = false;
      let typingSpeed = 150;

      function typeEffect() {
        const currentText = professions[currentIndex];
        if (isDeleting) {
          professionElement.textContent = currentText.substring(0, currentCharIndex - 1);
          currentCharIndex--;
        } else {
          professionElement.textContent = currentText.substring(0, currentCharIndex + 1);
          currentCharIndex++;
        }
        if (!isDeleting && currentCharIndex === currentText.length) {
          isDeleting = true; typingSpeed = 2000;
        } else if (isDeleting && currentCharIndex === 0) {
          isDeleting = false; currentIndex = (currentIndex + 1) % professions.length; typingSpeed = 500;
        } else {
          typingSpeed = isDeleting ? 100 : 150;
        }
        setTimeout(typeEffect, typingSpeed);
      }
      setTimeout(typeEffect, 1000);
    }

    document.addEventListener("DOMContentLoaded", () => {
      gsap.from(".hero-content h1", { opacity: 0, y: -50, duration: 1 });
      gsap.from(".hero-content h2", { opacity: 0, y: -50, duration: 1, delay: 0.3 });
      gsap.from(".cta-button", { opacity: 0, y: -20, duration: 1, delay: 0.6 });
      const sections = document.querySelectorAll("section");
      sections.forEach(section => {
        gsap.from(section, {
          opacity: 0,
          y: 50,
          duration: 1,
          scrollTrigger: { trigger: section, start: "top 80%", toggleActions: "play none none reverse" }
        });
      });
      document.querySelectorAll(".project-card").forEach(card => {
        card.addEventListener("mouseenter", () => gsap.to(card, { scale: 1.05, duration: 0.3 }));
        card.addEventListener("mouseleave", () => gsap.to(card, { scale: 1, duration: 0.3 }));
      });
    });

    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("contactForm");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        const name = document.getElementById("formName").value.trim();
        const email = document.getElementById("email").value.trim();
        const subject = document.getElementById("subject").value.trim();
        const message = document.getElementById("message").value.trim();

        if (!name || !email || !subject || !message) {
          alert("Please fill all fields.");
          return;
        }

        fetch("https://portfoliobackend-gak4.onrender.com/contact", {
          method: "POST",
          mode: "cors",
          cache: "no-cache",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, subject, message })
        })
          .then(async response => {
            const text = await response.text();
            if (!response.ok) {
              console.error("Backend response error:", response.status, text);
              alert("Message not sent: " + (text || response.status));
              return;
            }
            console.log("Backend response:", response.status, text);
            alert("Message sent successfully");
            form.reset();
          })
          .catch(error => {
            console.error("Fetch error:", error);
            alert("Network error sending message. Check your connection and retry.");
          });
      });
    });
  </script>
</body>
</html>
